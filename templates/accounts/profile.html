{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Profile - TibaFlow HMS{% endblock %}

{% block content %}
<section class="auth-page">
    <div class="auth-card auth-card-wide">
        <div class="auth-header">
            <span class="stat-icon tone-blue"><i class="fas fa-user-gear"></i></span>
            <div>
                <p class="eyebrow">Profile details</p>
                <h1>{% if user.full_name %}{{ user.full_name }}{% else %}{{ user.username }}{% endif %}</h1>
            </div>
        </div>
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary w-100 mt-3">
                <i class="fas fa-save me-2"></i>Update Profile
            </button>
        </form>
    </div>
</section>
{% endblock %}
