{% load crispy_forms_tags %}

<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body px-4 pb-4">
                <div class="text-center mb-4">
                    <div class="auth-icon" style="width: 56px; height: 56px; background: linear-gradient(135deg, #0d6efd, #0a58ca); border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white; margin-bottom: 0.75rem; box-shadow: 0 8px 30px rgba(13, 110, 253, 0.2);">
                        <i class="fas fa-heartbeat"></i>
                    </div>
                    <h4 class="fw-bold mb-1">Welcome Back</h4>
                    <p class="text-muted small">Login to your TibaFlow account</p>
                </div>

                <form method="post" action="{% url 'accounts:login' %}" id="loginForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-right-to-bracket me-2"></i>Login
                    </button>
                </form>

                <div class="text-center mt-3">
                    <small class="text-muted">Don't have an account? <a href="{% url 'accounts:register' %}" class="text-primary fw-bold">Register</a></small>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .modal-content {
        border: none;
        border-radius: 20px;
        box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        overflow: hidden;
    }

    .modal-header {
        padding: 1rem 1.5rem 0;
    }

    .modal-header .btn-close {
        background: rgba(0,0,0,0.04);
        border-radius: 50%;
        padding: 0.5rem;
        opacity: 1;
        transition: all 0.3s ease;
    }

    .modal-header .btn-close:hover {
        background: rgba(0,0,0,0.08);
    }

    .modal-body .form-control {
        border-radius: 10px;
        border: 1px solid rgba(0,0,0,0.08);
        padding: 0.6rem 1rem;
        background: #f8fafc;
        transition: all 0.3s ease;
    }

    .modal-body .form-control:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
        background: white;
    }

    .modal-body .btn-primary {
        padding: 0.7rem;
        border-radius: 10px;
        font-weight: 600;
        background: linear-gradient(135deg, #0d6efd, #0a58ca);
        border: none;
        transition: all 0.3s ease;
    }

    .modal-body .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(13, 110, 253, 0.3);
    }

    .modal-body .form-label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #1a1a2e;
    }

    @media (max-width: 480px) {
        .modal-body {
            padding: 1.5rem !important;
        }
    }
</style>

<script>
// Function to get CSRF token from cookie
function getCsrfToken() {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, 'csrftoken'.length + 1) === ('csrftoken' + '=')) {
                cookieValue = decodeURIComponent(cookie.substring('csrftoken'.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// Ensure CSRF token is present in the form
document.addEventListener('DOMContentLoaded', function() {
    const loginForm = document.getElementById('loginForm');
    if (loginForm) {
        // Check if CSRF token is already in the form
        let hasCsrf = false;
        const inputs = loginForm.querySelectorAll('input');
        for (let i = 0; i < inputs.length; i++) {
            if (inputs[i].name === 'csrfmiddlewaretoken') {
                hasCsrf = true;
                break;
            }
        }
        
        // If not found, add it manually
        if (!hasCsrf) {
            const csrfToken = getCsrfToken();
            if (csrfToken) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'csrfmiddlewaretoken';
                input.value = csrfToken;
                loginForm.prepend(input);
            }
        }
    }
});

// Auto-open login modal if there's an error
document.addEventListener('DOMContentLoaded', function() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('login') || window.location.pathname === '/accounts/login/') {
        const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
        loginModal.show();
        if (urlParams.has('login')) {
            const newUrl = window.location.pathname;
            window.history.pushState({}, '', newUrl);
        }
    }
});

// If there are login errors, show the modal
document.addEventListener('DOMContentLoaded', function() {
    const errorMessages = document.querySelectorAll('.alert-error');
    if (errorMessages.length > 0) {
        const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
        loginModal.show();
    }
});
</script>
