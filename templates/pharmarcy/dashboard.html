{% extends 'base.html' %}

{% block title %}Pharmacy Dashboard{% endblock %}

{% block content %}
<div class="container">
    <div class="row mb-4">
        <div class="col">
            <h1>Pharmacy Dashboard</h1>
            <p class="text-muted">Welcome, {{ user.full_name }}!</p>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-6 mb-3">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h5 class="card-title">Pending Prescriptions</h5>
                    <p class="card-text">Prescriptions waiting to be dispensed</p>
                    <a href="#" class="btn btn-light">View</a>
                </div>
            </div>
        </div>
        <div class="col-md-6 mb-3">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h5 class="card-title">Dispense Medicine</h5>
                    <p class="card-text">Dispense prescribed medicine</p>
                    <a href="#" class="btn btn-light">Dispense</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
